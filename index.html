<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>

<!-- Google Fonts LXGW Marker Gothic -->
<link href="https://fonts.googleapis.com/css2?family=LXGW+Marker+Gothic&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'LXGW Marker Gothic', sans-serif; /* 全站字體 */
    scroll-behavior: smooth;
    background:#D1CF75;
    color:#5F4F3A; /* 內文顏色 */
}

nav {
    position: fixed; top:0; width:100%;
    background: rgba(141,153,91,0.9);
    display:flex; justify-content:center; padding:15px 0; z-index:10;
}
nav a { color:#fff; margin:0 25px; text-decoration:none; font-weight:bold; letter-spacing:1px; }
nav a:hover { text-decoration:underline; }

/* 標題和內文統一字體、顏色 */
#hero h1, section h2, section h3 {
    font-family: 'LXGW Marker Gothic', sans-serif;
    color:#5F4F3A; /* 與內文相同 */
    letter-spacing:1px;
    margin-bottom:25px;
}

section {
    min-height:100vh; padding:120px 20px 60px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
}
section.visible { opacity:1; transform: translateY(0); }

#hero {
    text-align:center; position:relative; overflow:hidden;
    background:url('hero.jpg') center/cover no-repeat;
}
#hero h1 { font-size:70px; margin-bottom:15px; }
#hero p { font-size:28px; color:#5F4F3A; }

.projects {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
    gap:25px; margin-top:25px; width:90%; max-width:1000px;
}
.project {
    border:1px solid #8D995B; border-radius:10px; overflow:hidden;
    background:#F0EFC2; cursor:pointer; transition: transform 0.3s, box-shadow 0.3s;
}
.project img { width:100%; display:block; }
.project:hover { transform:scale(1.05); box-shadow:0 8px 25px rgba(0,0,0,0.3); }

.filter-buttons { margin-bottom:20px; }
.filter-buttons button {
    padding:8px 18px; margin:0 10px;
    border:none; border-radius:5px; cursor:pointer;
    background:#8D995B; color:#fff; font-weight:bold;
    transition:0.3s;
}
.filter-buttons button:hover { background:#6a7448; }
.filter-buttons button.active { background:#333; }

#lightbox {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:100;
}
#lightbox img { max-width:90%; max-height:90%; border-radius:8px; }
#lightbox span { position:absolute; top:30px; right:30px; font-size:40px; color:#fff; cursor:pointer; }

.video-container { margin-top:25px; width:90%; max-width:800px; }
.video-container iframe { width:100%; height:450px; border:none; border-radius:8px; }

/* Email 不變藍 */
a[href^="mailto:"] {
    color: #5F4F3A;
    text-decoration: none;
}
a[href^="mailto:"]:hover { text-decoration: underline; }
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#work">Work</a>
  <a href="#connect">Connect</a>
</nav>

<section id="hero">
  <h1>曾珮甄作品集</h1>
  <p>Editing / Design / 3D Modeling</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>這裡可以寫你的自我介紹、專業能力或作品風格描述。</p>
</section>

<section id="work">
  <h2>Work</h2>

  <div class="filter-buttons">
    <button data-filter="editing">Editing</button>
    <button data-filter="design" class="active">Design</button>
    <button data-filter="modeling">3D Modeling</button>
  </div>

  <div class="projects">
    <!-- Design 分類圖片 -->
    <div class="project design"><img src="images/design/shift.jpg" alt="Design Project: Shift"></div>
    <div class="project design"><img src="images/design/filmfestival.jpg" alt="Design Project: Film Festival"></div>
    <div class="project design"><img src="images/design/communicationcamp.jpg" alt="Design Project: Communication Camp"></div>
    <div class="project design"><img src="images/design/voiceofzhongzheng.jpg" alt="Design Project: Voice of Zhongzheng"></div>

    <!-- Editing 與 3D Modeling 可之後補上 -->
  </div>

  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
  </div>
</section>

<section id="connect">
  <h2>Connect</h2>
  <p>Email: <a href="mailto:jane940410@gmail.com">jane940410@gmail.com</a></p>
</section>

<div id="lightbox"><span id="close">&times;</span><img src="" alt=""></div>

<script>
// Lightbox 功能
const projects = document.querySelectorAll('.project img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const closeBtn = document.getElementById('close');

projects.forEach(img => {
  img.addEventListener('click', () => { 
    lightbox.style.display = 'flex'; 
    lightboxImg.src = img.src; 
  });
});
closeBtn.addEventListener('click', () => { lightbox.style.display='none'; });
lightbox.addEventListener('click', (e)=>{ if(e.target===lightbox) lightbox.style.display='none'; });

// 滑動淡入動畫
const sections = document.querySelectorAll('section');
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{ if(entry.isIntersecting){ entry.target.classList.add('visible'); } });
}, { threshold:0.2 });
sections.forEach(section => observer.observe(section));

// 篩選功能
const filterButtons = document.querySelectorAll('.filter-buttons button');
const allProjects = document.querySelectorAll('.project');
filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.getAttribute('data-filter');
    allProjects.forEach(p => {
      p.style.display = p.classList.contains(filter) ? 'block':'none';
    });
  });
});
</script>

</body>
</html>
