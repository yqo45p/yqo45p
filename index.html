<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>
<style>
    body { margin:0; font-family: Arial, sans-serif; scroll-behavior: smooth; background:#f4f4f4; color:#333;}
    nav { position: fixed; top:0; width:100%; background:rgba(34,34,34,0.9); color:#fff; display:flex; justify-content:center; padding:10px 0; z-index:10;}
    nav a { color:#fff; margin:0 20px; text-decoration:none; font-weight:bold; }
    nav a:hover { text-decoration:underline; }

    section { min-height:100vh; padding:100px 20px 50px; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
    section.visible { opacity:1; transform: translateY(0); }

    /* Hero */
    #hero { color:#fff; text-align:center; position:relative; overflow:hidden; }
    #hero h1 { font-size:60px; margin-bottom:10px; z-index:1; position:relative;}
    #hero p { font-size:24px; z-index:1; position:relative;}
    #hero video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0; opacity:0.6; }

    .projects { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:20px; margin-top:20px; width:90%; max-width:1000px;}
    .project { border:1px solid #ccc; border-radius:8px; overflow:hidden; background:#fff; cursor:pointer; transition: transform 0.3s, box-shadow 0.3s; }
    .project img { width:100%; display:block; }
    .project:hover { transform:scale(1.05); box-shadow:0 6px 20px rgba(0,0,0,0.25); }

    section h2 { margin-bottom:20px; color:#222; }

    /* Lightbox */
    #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:100; }
    #lightbox img { max-width:90%; max-height:90%; border-radius:8px; }
</style>
</head>
<body>

<nav>
    <a href="#editing">剪輯</a>
    <a href="#design">設計</a>
    <a href="#modeling">3D建模</a>
</nav>

<section id="hero">
    <video autoplay muted loop>
        <source src="hero-background.mp4" type="video/mp4">
    </video>
    <h1>yqo45p</h1>
    <p>3D建模 / 影片剪輯 / 設計作品集</p>
</section>

<section id="editing">
    <h2>剪輯作品</h2>
    <div class="projects">
        <div class="project"><img src="editing1.jpg" alt="剪輯作品1"></div>
        <div class="project"><img src="editing2.jpg" alt="剪輯作品2"></div>
    </div>
</section>

<section id="design">
    <h2>設計作品</h2>
    <div class="projects">
        <div class="project"><img src="design1.jpg" alt="設計作品1"></div>
        <div class="project"><img src="design2.jpg" alt="設計作品2"></div>
    </div>
</section>

<section id="modeling">
    <h2>3D建模作品</h2>
    <div class="projects">
        <div class="project"><img src="model1.jpg" alt="3D建模作品1"></div>
        <div class="project"><img src="model2.jpg" alt="3D建模作品2"></div>
    </div>
</section>

<!-- Lightbox -->
<div id="lightbox"><img src="" alt=""></div>

<script>
    // 點擊作品放大
    const projects = document.querySelectorAll('.project img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');

    projects.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex';
            lightboxImg.src = img.src;
        });
    });

    lightbox.addEventListener('click', () => {
        lightbox.style.display = 'none';
    });

    // 滑動時淡入動畫
    const sections = document.querySelectorAll('section');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add('visible');
            }
        });
    }, { threshold:0.2 });

    sections.forEach(section => observer.observe(section));
</script>

</body>
</html>
