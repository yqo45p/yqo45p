<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>曾珮甄作品集</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: auto; padding: 20px; line-height: 1.6; }
        h1 { font-size: 36px; margin-bottom: 5px; }
        h2 { margin-top: 40px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .project { border: 1px solid #ccc; padding: 10px; border-radius: 8px; transition: transform 0.2s; }
        .project:hover { transform: scale(1.05); }
        img { width: 100%; border-radius: 5px; }
        .about, .contact { margin-top: 50px; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>曾珮甄作品集</h1>
    <p>剪輯、3D建模、設計</p>

    <h2>作品展示</h2>
    <div class="projects">
        <div class="project">
            <img src="作品1.jpg" alt="作品1">
            <p>作品1簡短描述</p>
        </div>
        <div class="project">
            <img src="作品2.jpg" alt="作品2">
            <p>作品2簡短描述</p>
        </div>
        <!-- 複製這個區塊可以新增更多作品 -->
    </div>

    <div class="about">
        <h2>關於我</h2>
        <p>這裡可以寫一段簡短自我介紹，例如你的專業能力、經歷或作品風格。</p>
    </div>

    <div class="contact">
        <h2>聯絡方式</h2>
        <p>Email: <a href="mailto:zeng@example.com">zeng@example.com</a></p>
        <p>作品集下載或其他聯絡方式也可以放在這裡</p>
    </div>
</body>
</html>
