<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>曾珮甄作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+HK:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family: 'Noto Serif HK', serif;
    scroll-behavior: smooth;
    background:#272727;
    color:#f0f0f0;
}
nav {
    position: fixed; top:0; width:100%; background: rgba(34,34,34,0.95); display:flex; justify-content:center; padding:15px 0; z-index:10;
}
nav a { color:#fff; margin:0 25px; text-decoration:none; font-weight:bold; letter-spacing:1px; }
nav a:hover { text-decoration:underline; }
section { min-height:100vh; padding:120px 20px 60px; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
section.visible { opacity:1; transform: translateY(0); }
#hero { color:#fff; text-align:center; position:relative; overflow:hidden; background:url('hero.jpg') center/cover no-repeat; }
#hero h1 { font-size:70px; margin-bottom:15px; z-index:1; position:relative; }
#hero p { font-size:26px; z-index:1; position:relative; }
.projects { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:25px; margin-top:25px; width:90%; max-width:1000px; }
.project { border:1px solid #444; border-radius:10px; overflow:hidden; background:#333; cursor:pointer; transition: transform 0.3s, box-shadow 0.3s; }
.project img { width:100%; display:block; }
.project:hover { transform:scale(1.05); box-shadow:0 8px 25px rgba(0,0,0,0.5); }
section h2, section h3, section p { color:#f0f0f0; letter-spacing:1px; }
#lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:100; }
#lightbox img { max-width:90%; max-height:90%; border-radius:8px; }
#lightbox span { position:absolute; top:30px; right:30px; font-size:40px; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<nav>
  <a href="#about">About</a>
  <a href="#work">Work</a>
  <a href="#connect">Connect</a>
</nav>

<section id="hero">
  <h1>yqo45p</h1>
  <p>剪輯 / 設計 / 3D建模</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>這裡寫你的自我介紹、專業能力、作品風格或經歷。</p>
</section>

<section id="work">
  <h2>Work</h2>
  <h3>剪輯</h3>
  <div class="projects">
    <div class="project"><img src="editing1.jpg" alt="剪輯作品1"></div>
    <div class="project"><img src="editing2.jpg" alt="剪輯作品2"></div>
  </div>
  <h3>設計</h3>
  <div class="projects">
    <div class="project"><img src="design1.jpg" alt="設計作品1"></div>
    <div class="project"><img src="design2.jpg" alt="設計作品2"></div>
  </div>
  <h3>3D建模</h3>
  <div class="projects">
    <div class="project"><img src="model1.jpg" alt="3D建模作品1"></div>
    <div class="project"><img src="model2.jpg" alt="3D建模作品2"></div>
  </div>
</section>

<section id="connect">
  <h2>Connect</h2>
  <p>Email: <a href="mailto:zeng@example.com">zeng@example.com</a></p>
  <p>Line/社群帳號也可以放在這裡</p>
</section>

<div id="lightbox"><span id="close">&times;</span><img src="" alt=""></div>

<script>
const projects = document.querySelectorAll('.project img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const closeBtn = document.getElementById('close');

projects.forEach(img => {
  img.addEventListener('click', () => { lightbox.style.display = 'flex'; lightboxImg.src = img.src; });
});
closeBtn.addEventListener('click', () => { lightbox.style.display='none'; });
lightbox.addEventListener('click', (e)=>{ if(e.target===lightbox) lightbox.style.display='none'; });

const sections = document.querySelectorAll('section');
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{ if(entry.isIntersecting){ entry.target.classList.add('visible'); } });
}, { threshold:0.2 });
sections.forEach(section => observer.observe(section));
</script>

</body>
</html>
